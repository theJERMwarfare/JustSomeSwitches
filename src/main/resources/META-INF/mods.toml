# The name of the mod loader type to load - for regular FML @Mod mods it should be javafml
modLoader="javafml"

# A version range to match for said mod loader - for regular FML @Mod it will be the Forge version
loaderVersion="${loader_version_range}"

# The license for your mod. This is mandatory metadata and allows for easier comprehension of your redistributive properties.
license="${mod_license}"

# A URL to refer people to when problems occur with this mod
issueTrackerURL="https://github.com/theJERMwarfare/JustSomeSwitches/issues"

# A list of mods - how many allowed here is determined by the individual mod loader
[[mods]]
# The unique mod identifier for the mod. Must be lowercase in English locale. Must fit the regex [a-z][a-z0-9_]{1,63}
# Must match the String constant located in the main mod class annotated with @Mod.
modId="${mod_id}"

# The human-readable display name for the mod.
displayName="${mod_name}"

# Mod logo file
logoFile="justsomeswitches.png"
logoBlur=false

# The version number of the mod
version="${mod_version}"

# A URL for the "homepage" for this mod, displayed in the mod UI
displayURL="https://github.com/theJERMwarfare/JustSomeSwitches"

# A text field displayed in the mod UI
credits="Thanks to Minecraft and Forge"

# A text field displayed in the mod UI
authors="${mod_authors}"

# The description text for the mod (multi line!)
description='''${mod_description}'''

# Dependencies - IMPORTANT: Do NOT make the mod depend on itself!
[[dependencies.justsomeswitches]]
# Forge dependency
modId="forge"
mandatory=true
# The version range of the dependency
versionRange="${forge_version_range}"
# An ordering relationship for the dependency
ordering="NONE"
# Side this dependency is applied on - BOTH, CLIENT, or SERVER
side="BOTH"

# Minecraft dependency
[[dependencies.justsomeswitches]]
modId="minecraft"
mandatory=true
# This version range declares a minimum of the current minecraft version up to but not including the next major version
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

# JEI soft dependency (optional - mod works without it)
[[dependencies.justsomeswitches]]
modId="jei"
mandatory=false
versionRange="[15.20.0,)"
ordering="AFTER"
side="CLIENT"
